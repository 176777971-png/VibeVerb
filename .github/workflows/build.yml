name: Build VibeVerb

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # allow manual trigger

jobs:
  # ── macOS (native) ──────────────────────────────
  build-macos:
    name: macOS VST3
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel $(sysctl -n hw.ncpu)

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/macos
          cp build/VibeVerb_artefacts/Release/VST3/VibeVerb.vst3 artifacts/macos/ || true
          find build -name "VibeVerb.vst3" -exec cp -r {} artifacts/macos/ \; 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: VibeVerb-macOS
          path: artifacts/macos/

  # ── Windows (MSVC) ──────────────────────────────
  build-windows:
    name: Windows VST3
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel $env:NUMBER_OF_PROCESSORS

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows | Out-Null
          $vst3 = Get-ChildItem -Path build -Recurse -Directory -Filter "VibeVerb.vst3" | Select-Object -First 1
          if ($vst3) {
            Copy-Item -Path $vst3.FullName -Destination artifacts/windows/ -Recurse -Force
          } else {
            Write-Error "VibeVerb.vst3 not found!"
            Get-ChildItem -Path build -Recurse -Directory | Where-Object { $_.Name -like "*.vst3" }
            exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: VibeVerb-Windows
          path: artifacts/windows/
